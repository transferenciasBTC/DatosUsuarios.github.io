  <script>  
    let count = parseInt(localStorage.getItem('adCount')) || 0;  
    const maxAds = 5;  
  
    const countElement = document.getElementById('count');  
    const progressFill = document.getElementById('progressFill');  
    const button = document.getElementById('downloadBtn');  
  
    function updateProgress() {  
      countElement.textContent = count;  
      const percentage = Math.min((count / maxAds) * 100, 100);  
      progressFill.style.width = percentage + '%';  
      progressFill.textContent = Math.round(percentage) + '%';  
  
      if (count >= maxAds) {  
        button.textContent = "⬇️ Descargar el archivo";  
        button.disabled = false;  
      } else {  
        button.textContent = `Faltan ${maxAds - count} anuncios`;  
        button.disabled = true;  
      }  
    }  
  
    document.querySelectorAll('.ad-clickable').forEach(ad => {  
      ad.style.cursor = 'pointer';  
      ad.addEventListener('click', () => {  
        count = Math.min(count + 1, maxAds);  
        localStorage.setItem('adCount', count);  
        updateProgress();  
          
        // Abre el enlace del anuncio  
        window.open('https://www.effectivecpmnetwork.com/dcyt95j7b?key=59ba8ab6636831c9de6999d76daca652', '_blank');  
      });  
    });  
  
    button.addEventListener('click', () => {  
      if (!button.disabled) {  
        window.open('https://www.mediafire.com/file/4k5lfchcefqlaz2/minecraft-26-23.apk/file', '_blank');  
      }  
    });  
  
    updateProgress();  
  </script>
